<!doctype html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Walk-In Tally</title>
<style>
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    padding: 20px;
    background: #f6f7f9;
    margin: 0;
  }

  .card {
    max-width: 560px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,.1);
  }

  h2 { margin: 0 0 10px; }

  label {
    font-weight: 800;
    font-size: 13px;
    display: block;
    margin-top: 12px;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-sizing: border-box;
    font-size: 15px;
  }

  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
    align-items: center;
  }

  button {
    padding: 12px 14px;
    background: #2563eb;
    color: white;
    border: 0;
    border-radius: 12px;
    font-weight: 800;
    cursor: pointer;
  }

  button:disabled {
    opacity: .65;
    cursor: not-allowed;
  }

  .status {
    margin-top: 12px;
    font-weight: 800;
  }

  .ok { color: #166534; }
  .bad { color: #b91c1c; }

  .muted {
    color: #6b7280;
    font-size: 13px;
    margin-top: 6px;
    line-height: 1.35;
  }

  .checkRow {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    margin-top: 12px;
  }

  .checkRow input {
    margin-top: 4px;
    width: 18px;
    height: 18px;
    flex: 0 0 auto;
  }

  .countGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 8px;
  }

  .countBtn {
    padding: 16px;
    font-size: 20px;
    font-weight: 800;
    border-radius: 12px;
    border: 1px solid #ccc;
    background: #f3f4f6;
    color: #111827;
  }

  .countBtn.selected {
    background: #2563eb;
    color: white;
    border-color: #2563eb;
  }
</style>
</head>
<body>

<div class="card">
  <h2>Walk-In Tally</h2>
  <div class="muted">
    Use this for walk-ins counted by stake. Shift is determined automatically based on time of submission.
  </div>

  <form id="walkForm" novalidate>

    <label for="stake">Stake</label>
    <select id="stake" name="stake" required>
      <option value="">Select stake</option>
    </select>

    <label for="submittedBy">Your Full Name (Walk-in Volunteer)</label>
    <input id="submittedBy" type="text" name="submittedBy" autocomplete="name" required>

    <label>Number of People</label>
    <div class="countGrid">
      <button type="button" class="countBtn" data-count="1">1</button>
      <button type="button" class="countBtn" data-count="2">2</button>
      <button type="button" class="countBtn" data-count="3">3</button>
      <button type="button" class="countBtn" data-count="4">4</button>
      <button type="button" class="countBtn" data-count="5">5</button>
      <button type="button" class="countBtn" data-count="6">6</button>
      <button type="button" class="countBtn" data-count="7">7</button>
      <button type="button" class="countBtn" data-count="8">8</button>
      <button type="button" class="countBtn" data-count="9">9</button>
      <button type="button" class="countBtn" data-count="10">10+</button>
    </div>
    <input type="hidden" id="count" name="count" required>

    <div class="checkRow">
      <input type="checkbox" id="youthGroup" name="youthGroup">
      <div class="muted">
        Youth Group
      </div>
    </div>

    <div class="checkRow">
      <input type="checkbox" id="safetyBriefing" name="safetyBriefing">
      <div class="muted">
        I received the orchard safety briefing today and agree to follow orchard safety rules.
      </div>
    </div>

    <div class="row">
      <button id="submitBtn" type="submit">Submit</button>
    </div>

    <div id="status" class="status"></div>
    <div class="muted" id="hint"></div>

  </form>
</div>

<script>
const WEBHOOK = "https://hook.us2.make.com/dn8du4dk8n4jdxothrkl2ai6dl5kcyic";

const STAKES = [
  { label: "Ben Lomond", value: "BenLomond" },
  { label: "Brigham City South", value: "BrighamCitySouth" },
  { label: "Farr West", value: "FarrWest" },
  { label: "Farr West Poplar", value: "FarrWestPoplar" },
  { label: "Harrisville", value: "Harrisville" },
  { label: "Hooper", value: "Hooper" },
  { label: "Hooper Utah Pioneer Trail", value: "HooperUtahPioneerTrail" },
  { label: "Huntsville Utah", value: "HuntsvilleUtah" },
  { label: "Kanesville", value: "Kanesville" },
  { label: "North Ogden", value: "NorthOgden" },
  { label: "North Ogden Coldwater", value: "NorthOgdenColdwater" },
  { label: "North Ogden East", value: "NorthOgdenEast" },
  { label: "Ogden", value: "Ogden" },
  { label: "Ogden East Ridge", value: "OgdenEastRidge" },
  { label: "Ogden Mound Fort", value: "OgdenMoundFort" },
  { label: "Ogden Utah Mount Lewis", value: "OgdenUtahMountLewis" },
  { label: "Ogden Utah Weber North", value: "OgdenUtahWeberNorth" },
  { label: "Ogden West", value: "OgdenWest" },
  { label: "Perry Utah", value: "PerryUtah" },
  { label: "Plain City", value: "PlainCity" },
  { label: "Pleasant View", value: "PleasantView" },
  { label: "Pleasant View Orchard Springs", value: "PleasantViewOrchardSprings" },
  { label: "Pleasant View South", value: "PleasantViewSouth" },
  { label: "West Haven", value: "WestHaven" },
  { label: "West Haven North", value: "WestHavenNorth" },
  { label: "Willard", value: "Willard" },
  { label: "Just Serve", value: "JustServe" },
  { label: "Share the Light", value: "ShareTheLight" }
];

const statusEl = document.getElementById("status");
const hintEl = document.getElementById("hint");
const submitBtn = document.getElementById("submitBtn");
const stakeSel = document.getElementById("stake");
const form = document.getElementById("walkForm");
const countInput = document.getElementById("count");
const countButtons = document.querySelectorAll(".countBtn");

let isSubmitting = false;

function setStatus(msg, ok = true) {
  statusEl.textContent = msg || "";
  statusEl.className = ok ? "status ok" : "status bad";
}

function formatISODate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function shiftFromTime(d) {
  return d.getHours() < 12 ? "AM Volunteer" : "PM Volunteer";
}

function selectCount(value) {
  countInput.value = value;
  countButtons.forEach(btn => {
    btn.classList.toggle("selected", btn.dataset.count === String(value));
  });
}

STAKES.forEach(s => {
  const opt = document.createElement("option");
  opt.value = s.value;
  opt.textContent = s.label;
  stakeSel.appendChild(opt);
});

const savedStake = localStorage.getItem("lastStake");
if (savedStake) {
  stakeSel.value = savedStake;
}

stakeSel.addEventListener("change", () => {
  localStorage.setItem("lastStake", stakeSel.value);
});

countButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    selectCount(btn.dataset.count);
  });
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!stakeSel.value) {
    setStatus("Please select a stake.", false);
    return;
  }

  if (!document.getElementById("submittedBy").value.trim()) {
    setStatus("Please enter your full name.", false);
    return;
  }

  if (!countInput.value) {
    setStatus("Please select the number of people.", false);
    return;
  }

  if (isSubmitting) return;

  isSubmitting = true;
  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting…";

  const attested = document.getElementById("safetyBriefing").checked;
  const youthGroup = document.getElementById("youthGroup").checked;
  const now = new Date();

  const payload = {
    source: "walkin",
    submittedAt: now.toISOString(),
    date: formatISODate(now),
    shift: shiftFromTime(now),
    stake: stakeSel.value,
    count: Number(countInput.value),
    submittedBy: document.getElementById("submittedBy").value.trim(),
    youthGroup: youthGroup ? "True" : "False",
    safetyBriefingAttested: attested ? "True" : "False",
    timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
  };

  try {
    const r = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!r.ok) throw new Error("Submission failed");

    const lastStake = stakeSel.value;

    setStatus("Walk-in recorded ✓", true);
    hintEl.textContent = `Recorded as ${payload.shift} for ${payload.date}.`;

    form.reset();
    stakeSel.value = lastStake;
    localStorage.setItem("lastStake", lastStake);
    countInput.value = "";
    countButtons.forEach(btn => btn.classList.remove("selected"));

  } catch (err) {
    setStatus("Submit failed. Please tell the orchard lead.", false);
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit";
    isSubmitting = false;
  }
});
</script>

</body>
</html>
